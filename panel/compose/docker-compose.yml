version: '3.8'

services:
  database:
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - "${DATA_DIR}/database:/var/lib/mysql"
    environment:
      MYSQL_ROOT_PASSWORD: "$$Jamiecracksalkadaily911$$"
      MYSQL_PASSWORD: "$$Jamiecracksalkadaily911$$"
      MYSQL_DATABASE: "panel"
      MYSQL_USER: "pterodactyl"
    networks:
      - local

  cache:
    image: redis:alpine
    restart: always
    networks:
      - local

  panel:
    image: ghcr.io/pterodactyl/panel:v1.11.10
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - database
      - cache
    volumes:
      - "${DATA_DIR}/panel/var:/app/var"
      - "${DATA_DIR}/panel/logs:/app/storage/logs"
      - "${DATA_DIR}/panel/nginx:/etc/nginx/conf.d"
    environment:
      APP_URL: "http://mcpanel.mcbetiers.com:8080"
      APP_TIMEZONE: "UTC"
      APP_SERVICE_AUTHOR: "admin@mcpanel.mcbetiers.com"
      APP_ENV: "production"
      APP_ENVIRONMENT_ONLY: "false"

      DB_HOST: "database"
      DB_PORT: "3306"
      DB_DATABASE: "panel"
      DB_USERNAME: "pterodactyl"
      DB_PASSWORD: "$$Jamiecracksalkadaily911$$"

      CACHE_DRIVER: "redis"
      SESSION_DRIVER: "redis"
      QUEUE_DRIVER: "redis"
      REDIS_HOST: "cache"

      TRUSTED_PROXIES: "*"
    networks:
      - local
      - pterodactyl

networks:
  local:
    driver: bridge
  pterodactyl:
    external: true
